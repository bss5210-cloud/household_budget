<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>머니로그</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-database-compat.js"></script>
<style>
  :root {
    --bg: #f5f3ee; --surface: #ffffff; --surface2: #f9f8f5;
    --border: #e8e4dc; --text: #1a3a2a; --text-muted: #8a8378;
    --accent: #c8651a; --accent-light: #f5e6d8;
    --green: #2d7a4f; --red: #c0392b; --red-light: #fdecea;
    --blue: #2563a8; --savings: #7c4dbd;
    --husband: #1e6fa0; --wife: #c84b91;
    --shadow: 0 2px 12px rgba(0,0,0,0.06); --radius: 12px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Noto Sans KR', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }

  .sync-bar { background: rgba(26, 58, 42, 0.4); color: white; font-size: 11px; font-weight: 600; text-align: center; padding: 5px 12px; transition: background 0.3s; position: fixed; bottom: 52px; left: 0; right: 0; z-index: 98; }
  .sync-bar.syncing { background: var(--accent); }
  .sync-bar.error { background: var(--red); }

  header { background: var(--text); color: white; padding: 0 20px; display: flex; align-items: center; justify-content: space-between; height: 52px; position: sticky; top: 0; z-index: 100; }
  header h1 { font-size: 15px; font-weight: 700; }
  .month-nav { display: flex; align-items: center; gap: 6px; }
  .month-nav button { background: rgba(255,255,255,0.15); border: none; color: white; cursor: pointer; width: 28px; height: 28px; border-radius: 6px; font-size: 15px; display: flex; align-items: center; justify-content: center; transition: background 0.2s; }
  .month-nav button:hover { background: rgba(255,255,255,0.28); }
  #month-label { font-size: 14px; font-weight: 600; min-width: 88px; text-align: center; font-family: 'DM Mono', monospace; }

  .tabs { display: flex; background: var(--surface); border-bottom: 1px solid var(--border); padding: 0 16px; gap: 2px; overflow-x: auto; position: sticky; top: 52px; z-index: 90; }
  .tab-btn { padding: 11px 14px; border: none; background: none; cursor: pointer; font-family: 'Noto Sans KR', sans-serif; font-size: 13px; font-weight: 500; color: var(--text-muted); border-bottom: 2px solid transparent; transition: all 0.2s; white-space: nowrap; }
  .tab-btn.active { color: var(--accent); border-bottom-color: var(--accent); }

  .main { max-width: 1100px; margin: 0 auto; padding: 18px 14px; }

  .summary-row { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 10px; margin-bottom: 18px; }
  .card { background: var(--surface); border-radius: var(--radius); padding: 14px 16px; box-shadow: var(--shadow); border: 1px solid var(--border); }
  .card-label { font-size: 10px; color: var(--text-muted); font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 5px; }
  .card-value { font-size: 19px; font-weight: 700; font-family: 'DM Mono', monospace; }
  .card-value.red { color: var(--red); } .card-value.blue { color: var(--blue); } .card-value.purple { color: var(--savings); }
  .card-sub { font-size: 10px; color: var(--text-muted); margin-top: 3px; }

  .section { margin-bottom: 18px; }
  .section-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 8px; }
  .section-title { font-size: 12px; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; color: var(--text-muted); display: flex; align-items: center; gap: 6px; }

  .table-wrap { background: var(--surface); border-radius: var(--radius); box-shadow: var(--shadow); border: 1px solid var(--border); overflow: hidden; }
  table { width: 100%; border-collapse: collapse; }
  th { background: var(--surface2); padding: 8px 10px; font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.5px; color: var(--text-muted); text-align: left; border-bottom: 1px solid var(--border); }
  td { padding: 8px 10px; font-size: 13px; border-bottom: 1px solid var(--border); vertical-align: middle; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 120px; }
  tr:last-child td { border-bottom: none; }
  tr:hover td { background: var(--surface2); }
  .amount { font-family: 'DM Mono', monospace; text-align: right; font-size: 12px; }
  .amount.neg { color: var(--red); } .amount.pos { color: var(--green); }

  .badge { display: inline-block; padding: 2px 7px; border-radius: 20px; font-size: 10px; font-weight: 600; white-space: nowrap; }
  .badge-husband { background: #dbeeff; color: var(--husband); }
  .badge-wife { background: #fde8f4; color: var(--wife); }
  .badge-both { background: var(--accent-light); color: var(--accent); }
  .pay-badge { display: inline-block; padding: 2px 6px; border-radius: 4px; font-size: 10px; font-weight: 500; background: var(--surface2); color: var(--text-muted); border: 1px solid var(--border); }

  .add-btn { background: var(--accent); color: white; border: none; cursor: pointer; padding: 6px 12px; border-radius: 8px; font-size: 12px; font-weight: 700; font-family: 'Noto Sans KR', sans-serif; display: flex; align-items: center; gap: 4px; transition: opacity 0.2s; }
  .add-btn:hover { opacity: 0.85; }
  .del-btn { background: none; border: none; cursor: pointer; color: var(--text-muted); font-size: 13px; padding: 2px 5px; border-radius: 4px; transition: all 0.15s; opacity: 0; }
  tr:hover .del-btn { opacity: 1; }
  .del-btn:hover { background: var(--red-light); color: var(--red); }

  .filter-row { display: flex; gap: 5px; }
  .filter-btn { padding: 4px 10px; border-radius: 20px; border: 1.5px solid var(--border); background: white; cursor: pointer; font-size: 10px; font-weight: 700; font-family: 'Noto Sans KR', sans-serif; transition: all 0.15s; color: var(--text-muted); }
  .filter-btn.f-all { border-color: var(--text); background: var(--text); color: white; }
  .filter-btn.f-wife { border-color: var(--wife); background: #fde8f4; color: var(--wife); }
  .filter-btn.f-husband { border-color: var(--husband); background: #dbeeff; color: var(--husband); }

  .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.45); z-index: 200; display: flex; align-items: center; justify-content: center; opacity: 0; pointer-events: none; transition: opacity 0.2s; }
  .modal-overlay.open { opacity: 1; pointer-events: all; }
  .modal { background: white; border-radius: 16px; padding: 22px; width: 92%; max-width: 460px; box-shadow: 0 20px 60px rgba(0,0,0,0.2); transform: translateY(12px); transition: transform 0.2s; }
  .modal-overlay.open .modal { transform: translateY(0); }
  .modal h2 { font-size: 15px; font-weight: 700; margin-bottom: 16px; }
  .form-row { display: flex; gap: 8px; margin-bottom: 10px; flex-wrap: wrap; }
  .form-group { display: flex; flex-direction: column; gap: 3px; flex: 1; min-width: 110px; }
  .form-group label { font-size: 10px; font-weight: 700; color: var(--text-muted); text-transform: uppercase; }
  .form-group input, .form-group select { padding: 8px 10px; border: 1.5px solid var(--border); border-radius: 8px; font-size: 13px; font-family: 'Noto Sans KR', sans-serif; outline: none; transition: border-color 0.2s; background: white; }
  .form-group input:focus, .form-group select:focus { border-color: var(--accent); }
  .modal-actions { display: flex; gap: 8px; justify-content: flex-end; margin-top: 16px; }
  .btn-cancel { padding: 8px 16px; border: 1.5px solid var(--border); background: white; border-radius: 8px; cursor: pointer; font-size: 13px; font-family: 'Noto Sans KR', sans-serif; }
  .btn-save { padding: 8px 18px; background: var(--accent); color: white; border: none; border-radius: 8px; cursor: pointer; font-size: 13px; font-weight: 700; font-family: 'Noto Sans KR', sans-serif; }

  .savings-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(210px, 1fr)); gap: 10px; }
  .savings-card { background: var(--surface); border-radius: var(--radius); border: 1px solid var(--border); box-shadow: var(--shadow); padding: 14px; }
  .savings-card-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 8px; }
  .savings-name { font-size: 13px; font-weight: 700; }
  .savings-bank { font-size: 10px; color: var(--text-muted); margin-top: 2px; }
  .progress-bar { height: 5px; background: var(--border); border-radius: 3px; overflow: hidden; margin: 6px 0; }
  .progress-fill { height: 100%; background: var(--savings); border-radius: 3px; }
  .savings-total { font-size: 17px; font-weight: 700; font-family: 'DM Mono', monospace; color: var(--savings); }
  .savings-monthly { font-size: 10px; color: var(--text-muted); margin-top: 2px; }
  .savings-meta { font-size: 10px; color: var(--text-muted); margin-top: 5px; }

  .ratio-bar { height: 7px; background: var(--border); border-radius: 4px; overflow: hidden; margin: 3px 0; display: flex; }

  .tab-panel { display: none; }
  .tab-panel.active { display: block; }
  .empty { text-align: center; padding: 28px; color: var(--text-muted); font-size: 13px; }
  .empty-icon { font-size: 28px; margin-bottom: 6px; }

  #loading-overlay { position: fixed; inset: 0; background: var(--bg); display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 999; font-size: 14px; color: var(--text-muted); gap: 12px; }
  .spinner { width: 32px; height: 32px; border: 3px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.8s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }

  @media (max-width: 640px) {
    .main { padding: 12px 10px 120px; }
    .summary-row { grid-template-columns: 1fr 1fr; gap: 8px; }
    .card-value { font-size: 16px; }
    .card { padding: 12px 12px; }
    .overview-chart-grid { grid-template-columns: 1fr !important; }
    .table-wrap { overflow-x: hidden; }
    table { width: 100%; min-width: unset; table-layout: fixed; }
    th, td { padding: 8px 6px; font-size: 12px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    /* 자산탭 - 내역/금액/담당 3열 */
    #assets-table th:nth-child(1), #assets-table td:nth-child(1) { width: 45%; }
    #assets-table th:nth-child(2), #assets-table td:nth-child(2) { width: 35%; text-align:right; }
    #assets-table th:nth-child(3), #assets-table td:nth-child(3) { width: 20%; text-align:center; }
    #fixed-table th:nth-child(1), #fixed-table td:nth-child(1) { width: 14%; }
    #fixed-table th:nth-child(2), #fixed-table td:nth-child(2) { width: 40%; }
    #fixed-table th:nth-child(3), #fixed-table td:nth-child(3) { width: 26%; text-align:right; }
    #fixed-table th:nth-child(4), #fixed-table td:nth-child(4) { width: 20%; text-align:center; }
    /* 변동비 */
    #variable-table th:nth-child(1), #variable-table td:nth-child(1) { width: 16%; }
    #variable-table th:nth-child(2), #variable-table td:nth-child(2) { width: 22%; }
    #variable-table th:nth-child(3), #variable-table td:nth-child(3) { width: 22%; }
    #variable-table th:nth-child(4), #variable-table td:nth-child(4) { width: 22%; }
    #variable-table th:nth-child(5), #variable-table td:nth-child(5) { width: 18%; text-align:right; }
    .section-header { flex-wrap: wrap; gap: 8px; }
    .del-btn { opacity: 1 !important; }
    .savings-grid { grid-template-columns: 1fr; }
    .tabs { display: none; }
    .bottom-nav { display: flex !important; }
    .modal-overlay { align-items: flex-end; }
    .modal { width: 100%; max-width: 100%; border-radius: 20px 20px 0 0; padding: 20px 18px 36px; transform: translateY(100%); }
    .modal-overlay.open .modal { transform: translateY(0); }
    .form-group input, .form-group select { padding: 11px 12px; font-size: 16px; }
    .add-btn { padding: 8px 14px; font-size: 13px; }
    header h1 { font-size: 14px; }
    #month-label { font-size: 13px; min-width: 76px; }
    .badge { font-size: 9px; padding: 1px 5px; }
  }
  .bottom-nav { display: none; }
  .bottom-nav button { flex: 1; border: none; background: white; padding: 12px 2px; font-family: 'Noto Sans KR', sans-serif; font-size: 11px; font-weight: 600; color: var(--text-muted); cursor: pointer; display: flex; align-items: center; justify-content: center; transition: color 0.2s; }
  .bottom-nav button.active { color: var(--accent); }

</style>
</head>
<body>

<div id="loading-overlay"><div class="spinner"></div><span>데이터 불러오는 중...</span></div>

<div id="lock-screen" style="position:fixed;inset:0;background:var(--text);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:9999;gap:16px">
  <div style="font-size:20px;font-weight:700;color:white">머니로그</div>
  <div style="font-size:13px;color:rgba(255,255,255,0.6);margin-bottom:8px">비밀번호를 입력해주세요</div>
  <input id="lock-input" type="password" placeholder="비밀번호" maxlength="20"
    style="padding:12px 18px;border-radius:12px;border:none;font-size:16px;font-family:'Noto Sans KR',sans-serif;width:220px;text-align:center;outline:none"
    onkeydown="if(event.key==='Enter')checkPassword()">
  <button onclick="checkPassword()"
    style="background:var(--accent);color:white;border:none;padding:12px 32px;border-radius:12px;font-size:14px;font-weight:700;font-family:'Noto Sans KR',sans-serif;cursor:pointer;width:220px">
    입력
  </button>
  <div id="lock-error" style="color:#ff6b6b;font-size:12px;height:16px"></div>
</div>

<header>
  <h1>머니로그</h1>
  <div class="month-nav">
    <button onclick="changeMonth(-1)">‹</button>
    <span id="month-label"></span>
    <button onclick="changeMonth(1)">›</button>
  </div>
</header>

<div class="tabs">
  <button class="tab-btn active" onclick="switchTab('overview',this)">📊 요약</button>
  <button class="tab-btn" onclick="switchTab('income',this)">💵 수입</button>
  <button class="tab-btn" onclick="switchTab('variable',this)">💳 변동비</button>
  <button class="tab-btn" onclick="switchTab('fixed',this)">📋 고정비</button>
  <button class="tab-btn" onclick="switchTab('savings',this)">🏦 자산</button>
</div>

<div class="main">
  <div id="tab-overview" class="tab-panel active">
    <div class="summary-row" id="summary-cards"></div>
    <div class="overview-chart-grid" style="display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:18px">
      <div class="card"><div class="card-label">👥 인별 지출</div><div id="person-chart" style="margin-top:8px"></div></div>
      <div class="card"><div class="card-label">📂 카테고리별</div><div id="category-chart" style="margin-top:8px"></div></div>
    </div>
    <div class="section">
      <div class="section-header"><div class="section-title"><span>💳</span> 결제수단별</div></div>
      <div class="table-wrap"><table><thead><tr><th>결제수단</th><th style="text-align:right">금액</th><th style="text-align:right">건수</th></tr></thead><tbody id="payment-table"></tbody></table></div>
    </div>
  </div>

  <div id="tab-income" class="tab-panel">
    <div class="section-header">
      <div class="section-title"><span>📌</span> 고정 수입 (매월)</div>
      <button class="add-btn" onclick="openModal('fixed-income')">+ 추가</button>
    </div>
    <div class="table-wrap"><table><thead><tr><th>내역</th><th>담당</th><th style="text-align:right">금액</th><th></th></tr></thead><tbody id="fixed-income-table"></tbody></table></div>
    <div class="section-header" style="margin-top:14px">
      <div class="section-title"><span>💵</span> 이번달 추가 수입</div>
      <button class="add-btn" onclick="openModal('income')">+ 추가</button>
    </div>
    <div class="table-wrap"><table><thead><tr><th>내역</th><th>담당</th><th style="text-align:right">금액</th><th></th></tr></thead><tbody id="income-table"></tbody></table></div>
  </div>

  <div id="tab-variable" class="tab-panel">
    <div class="section-header">
      <div class="section-title"><span>💳</span> 변동비</div>
      <div style="display:flex;gap:8px;align-items:center">
        <div class="filter-row">
          <button class="filter-btn f-all" onclick="setFilter('all',this)">전체</button>
          <button class="filter-btn" onclick="setFilter('wife',this)">허정수</button>
          <button class="filter-btn" onclick="setFilter('husband',this)">한국일</button>
        </div>
        <button class="add-btn" onclick="openSmsModal()">📋 문자 붙여넣기</button>
        <button class="add-btn" onclick="openModal('variable')">+ 추가</button>
      </div>
    </div>
    <div class="table-wrap"><table><thead><tr><th>날짜</th><th>구분</th><th style="text-align:right">금액</th><th>내역</th><th>결재자</th><th>결제수단</th></tr></thead><tbody id="variable-table"></tbody><tfoot><tr style="background:var(--surface2)"><td colspan="2" style="font-weight:700;padding:8px 10px">합계</td><td id="variable-total" class="amount neg" style="font-weight:700;padding:8px 10px"></td><td colspan="3"></td></tr></tfoot></table></div>
  </div>

  <div id="tab-fixed" class="tab-panel">
    <div class="section-header">
      <div class="section-title"><span>📋</span> 고정비</div>
      <div style="display:flex;gap:8px;align-items:center">
        <div class="filter-row">
          <button class="filter-btn f-all" onclick="setFixedFilter('all',this)">전체</button>
          <button class="filter-btn" onclick="setFixedFilter('wife',this)">허정수</button>
          <button class="filter-btn" onclick="setFixedFilter('husband',this)">한국일</button>
        </div>
        <button class="add-btn" onclick="openModal('fixed')">+ 추가</button>
      </div>
    </div>
    <div class="table-wrap"><table><thead><tr><th>구분</th><th>내역</th><th style="text-align:right">금액</th><th>담당</th></tr></thead><tbody id="fixed-table"></tbody></table></div>
    <div class="section" style="margin-top:14px">
      <div class="section-header"><div class="section-title"><span>📊</span> 구분별 합계</div></div>
      <div class="table-wrap"><table><thead><tr><th>구분</th><th style="text-align:right">금액</th><th style="text-align:right">비중</th></tr></thead><tbody id="fixed-summary-table"></tbody><tfoot><tr style="background:var(--surface2)"><td style="font-weight:700;padding:8px 10px">합계</td><td id="fixed-summary-total" class="amount neg" style="font-weight:700"></td><td></td></tr></tfoot></table></div>
    </div>
  </div>

  <div id="tab-savings" class="tab-panel">
    <div class="section-header">
      <div class="section-title"><span>🏦</span> 자산 현황</div>
      <button class="add-btn" onclick="openModal('asset')">+ 자산 추가</button>
    </div>
    <div class="table-wrap"><table><thead><tr><th>내역</th><th style="text-align:right">금액 / 누적</th><th>담당</th></tr></thead><tbody id="assets-table"></tbody><tfoot><tr style="background:var(--surface2)"><td style="font-weight:700;padding:8px 10px">총합</td><td id="assets-total" class="amount pos" style="font-weight:700;padding:8px 10px;text-align:right"></td><td></td></tr></tfoot></table></div>
  </div>
</div>

<!-- 하단 상태바 -->
<div class="sync-bar" id="sync-bar">연결 중...</div>

<!-- 하단 네비 (모바일) -->
<nav class="bottom-nav" id="bottom-nav" style="position:fixed;bottom:0;left:0;right:0;z-index:99;border-top:1px solid var(--border);box-shadow:0 -2px 12px rgba(0,0,0,0.08)">
  <button class="active" onclick="switchTab('overview',this);syncBottomNav(this)">요약</button>
  <button onclick="switchTab('income',this);syncBottomNav(this)">수입</button>
  <button onclick="switchTab('variable',this);syncBottomNav(this)">변동비</button>
  <button onclick="switchTab('fixed',this);syncBottomNav(this)">고정비</button>
  <button onclick="switchTab('savings',this);syncBottomNav(this)">자산</button>
</nav>

<!-- 문자 파싱 모달 -->
<div class="modal-overlay" id="sms-modal-overlay" onclick="if(event.target===this)closeSmsModal()">
  <div class="modal" style="max-width:520px">
    <h2>📋 카드 문자 붙여넣기</h2>
    <p style="font-size:12px;color:var(--text-muted);margin-bottom:12px">카드 결제 문자를 아래에 붙여넣으세요. 여러 건 한꺼번에 가능해요.</p>
    <textarea id="sms-input" placeholder="예시)
[신한카드] 12,000원 스타벅스 23.03.15
[쿠팡페이] 34,500원 승인 마켓컬리 03/15
Web발신 [국민BC] 45,000원(일시불) CU편의점 2026-03-15" style="width:100%;height:130px;padding:10px;border:1.5px solid var(--border);border-radius:8px;font-size:13px;font-family:'Noto Sans KR',sans-serif;resize:none;outline:none;line-height:1.6"></textarea>
    <div id="sms-preview" style="margin-top:12px"></div>
    <div class="modal-actions">
      <button class="btn-cancel" onclick="closeSmsModal()">취소</button>
      <button class="btn-save" onclick="saveSmsItems()">추가하기</button>
    </div>
  </div>
</div>

function setupRealtimeListeners() {

    const v = snap.val();
    if (v !== null && JSON.stringify(v) !== JSON.stringify(db.variable)) {
      db.variable = v; render();
      setSyncBar('ok','✔ 업데이트됨');
    }
  });
  fdb.ref(FIXED_KEY).on('value', snap => {
    const f = snap.val();
    if (f !== null && JSON.stringify(f) !== JSON.stringify(db.fixed)) {
      db.fixed = f; render();
    }
  });
}

const fmt = n => Math.abs(n).toLocaleString('ko-KR');

function render() {
  document.getElementById('month-label').textContent = `${year}년 ${month}월`;
  renderOverview(); renderIncome(); renderVariable(); renderFixed(); renderSavings();
}

function renderIncome() {
  const fixedIncome = db.fixedIncome || [];
  const income = db.income || [];
  const allIncome = [...fixedIncome, ...income];
  const incomeTotal = allIncome.reduce((s,r)=>s+r.amount,0);

  // 고정 수입
  document.getElementById('fixed-income-table').innerHTML = fixedIncome.length
    ? fixedIncome.map(r=>`<tr style="cursor:pointer" onclick="openEditModal('fixed-income','${r.id}')" title="클릭하여 수정">
        <td>${r.desc} <span style="font-size:9px;background:var(--accent-light);color:var(--accent);padding:1px 5px;border-radius:10px;font-weight:600">매월</span></td>
        <td>${personBadge(r.person)}</td>
        <td class="amount pos">${fmt(r.amount)}</td>
      </tr>`).join('')
    :'<tr><td colspan="3"><div class="empty">고정 수입을 추가해보세요</div></td></tr>';

  // 월별 수입
  document.getElementById('income-table').innerHTML = income.length
    ? income.map(r=>`<tr style="cursor:pointer" onclick="openEditModal('income','${r.id}')" title="클릭하여 수정">
        <td>${r.desc}</td>
        <td>${personBadge(r.person)}</td>
        <td class="amount pos">${fmt(r.amount)}</td>
      </tr>`).join('')
    :'<tr><td colspan="3"><div class="empty">이번 달 추가 수입을 입력해보세요</div></td></tr>';
}

function renderOverview() {
  const vars = db.variable||[], fixed = db.fixed||[];
  const vT = vars.reduce((s,r)=>s+r.amount,0);
  const fT = fixed.reduce((s,r)=>s+r.amount,0);
  // 자동 연동 적금 누적 (고정비 적금 전부 + autoMeta 시작월 반영)
  const fixedSavingsAuto = (db.fixed||[]).filter(r=>r.cat==='적금');
  const autoSavT = fixedSavingsAuto.reduce((s,r)=>{
    const meta = (db.autoMeta||{})[r.id] || {};
    return s + calcAcc({monthly: r.amount, startMonth: meta.startMonth||''});
  }, 0);
  // 수동 savings 누적
  const manualSavT = (db.savings||[]).reduce((s,p)=>s+calcAcc(p),0);
  const savT = autoSavT + manualSavT;
  const assetT = (db.assets||[]).reduce((s,a)=>s+a.amount,0);
  const totalWealth = savT + assetT;
  const incomeTotal = [...(db.income||[]), ...(db.fixedIncome||[])].reduce((s,r)=>s+r.amount,0);
  const remain = incomeTotal - (vT+fT);
  const totalWealthWithRemain = totalWealth + remain;
  document.getElementById('summary-cards').innerHTML = `
    <div class="card"><div class="card-label">총 수입</div><div class="card-value green">${fmt(incomeTotal)}</div><div class="card-sub">${(db.income||[]).length}건</div></div>
    <div class="card"><div class="card-label">총 지출</div><div class="card-value red">${fmt(vT+fT)}</div><div class="card-sub">변동비+고정비</div></div>
    <div class="card"><div class="card-label">잔액</div><div class="card-value ${remain>=0?'green':'red'}">${fmt(remain)}</div><div class="card-sub">${remain>=0?'여유 있어요':'초과됐어요'}</div></div>
    <div class="card"><div class="card-label">자산현황</div><div class="card-value purple">${fmt(totalWealthWithRemain)}</div><div class="card-sub">예적금+자산+잔액</div></div>
  `;

  const all = [...vars,...fixed];
  const wT=all.filter(r=>r.person==='wife').reduce((s,r)=>s+r.amount,0);
  const hT=all.filter(r=>r.person==='husband').reduce((s,r)=>s+r.amount,0);
  const tot=wT+hT||1;
  document.getElementById('person-chart').innerHTML = [
    ['허정수',wT,Math.round(wT/tot*100),'var(--wife)','background:var(--wife)'],
    ['한국일',hT,Math.round(hT/tot*100),'var(--husband)','background:var(--husband)'],
  ].map(([n,a,p,c,s])=>`
    <div style="margin-bottom:7px">
      <div style="display:flex;justify-content:space-between;font-size:11px;margin-bottom:2px"><span style="color:${c};font-weight:700">${n}</span><span style="font-family:'DM Mono',monospace">${fmt(a)}</span></div>
      <div class="ratio-bar"><div style="width:${p}%;height:100%;${s};border-radius:3px"></div></div>
    </div>`).join('');

  const catMap={};
  all.forEach(r=>{catMap[r.cat]=(catMap[r.cat]||0)+r.amount;});
  const catArr=Object.entries(catMap).sort((a,b)=>b[1]-a[1]).slice(0,6);
  const cMax=catArr[0]?.[1]||1;
  document.getElementById('category-chart').innerHTML = catArr.map(([c,a])=>`
    <div style="margin-bottom:6px">
      <div style="display:flex;justify-content:space-between;font-size:11px;margin-bottom:1px"><span>${c}</span><span style="font-family:'DM Mono',monospace">${fmt(a)}</span></div>
      <div class="ratio-bar"><div style="width:${Math.round(a/cMax*100)}%;height:100%;background:var(--accent);border-radius:3px;opacity:.6"></div></div>
    </div>`).join('')||'<div class="empty">데이터 없음</div>';

  const pm={},pc={};
  vars.forEach(r=>{pm[r.payment]=(pm[r.payment]||0)+r.amount;pc[r.payment]=(pc[r.payment]||0)+1;});
  document.getElementById('payment-table').innerHTML = Object.entries(pm).sort((a,b)=>b[1]-a[1])
    .map(([p,a])=>`<tr><td><span class="pay-badge">${p||'기타'}</span></td><td class="amount neg">${fmt(a)}</td><td class="amount" style="color:var(--text-muted)">${pc[p]}건</td></tr>`).join('')
    ||'<tr><td colspan="3" class="empty">변동비 없음</td></tr>';
}

  return p==='wife'?'<span class="badge badge-wife">허정수</span>':'<span class="badge badge-husband">한국일</span>';

function renderFixed() {

      </tr>`).join('')
    :'<tr><td colspan="4"><div class="empty">고정비 없음</div></td></tr>';

  // 구분별 합계
  const catMap = {};
  (db.fixed||[]).forEach(r=>{ catMap[r.cat]=(catMap[r.cat]||0)+r.amount; });
  const total = Object.values(catMap).reduce((s,v)=>s+v,0)||1;
  const catArr = Object.entries(catMap).sort((a,b)=>a[0].localeCompare(b[0],'ko'));
  document.getElementById('fixed-summary-table').innerHTML = catArr.map(([cat,amt])=>`
    <tr>
      <td>${cat}</td>
      <td class="amount neg">${fmt(amt)}</td>
      <td class="amount" style="color:var(--text-muted)">${Math.round(amt/total*100)}%</td>
    </tr>`).join('');
  document.getElementById('fixed-summary-total').textContent = fmt(total);
}

function calcMonths(s) {
  if(!s.startMonth) return 0;
  const parts = s.startMonth.split('-').map(Number);
  let sy = parts[0], sm = parts[1];
  if(sy < 100) sy += 2000; // YY → YYYY
  return Math.max(0,(year-sy)*12+(month-sm)+1);
}
function calcAcc(s){ return calcMonths(s)*s.monthly; }

function renderSavings() {
  // 고정비 적금 자동 연동
  const fixedSavings = (db.fixed||[]).filter(r=>r.cat==='적금');
  const autoItems = fixedSavings.map(r => {
    const meta = (db.autoMeta||{})[r.id] || {};
    return {
      id: 'auto-'+r.id, fixedId: r.id, type: 'auto-savings',
      cat: '적금', desc: r.desc, person: r.person||'wife',
      monthly: r.amount, startMonth: meta.startMonth||'', maturity: meta.maturity||''
    };
  });

  // 수동 savings
  const manualItems = (db.savings||[]).map(s=>({
    id: s.id, type: 'savings',
    cat: '적금', desc: s.name, person: 'wife',
    monthly: s.monthly, startMonth: s.startMonth||'', maturity: s.maturity||''
  }));

  // 자산 항목
  const assetItems = (db.assets||[]).map(a=>({
    id: a.id, type: 'asset',
    cat: a.cat, desc: a.desc, person: a.person||'wife',
    startMonth: a.startMonth||'', maturity: a.maturity||'', amount: a.amount
  }));

  const allItems = [...manualItems, ...autoItems, ...assetItems];

  document.getElementById('assets-table').innerHTML = allItems.length
    ? allItems.map(item => {
        if (item.type === 'auto-savings') {
          const acc = calcAcc({monthly: item.monthly, startMonth: item.startMonth});
          const mo  = calcMonths({startMonth: item.startMonth});
          return `<tr style="cursor:pointer" onclick="openEditModal('auto-savings','${item.fixedId}')" title="클릭하여 수정">
            <td>${item.desc}</td>
            <td class="amount" style="color:var(--savings);font-weight:700">${fmt(acc)} <span style="font-size:10px;color:var(--text-muted);font-weight:400">×${mo}</span></td>
            <td>${personBadge(item.person)}</td>
          </tr>`;
        } else if (item.type === 'savings') {
          const acc = calcAcc({monthly: item.monthly, startMonth: item.startMonth});
          const mo  = calcMonths({startMonth: item.startMonth});
          return `<tr style="cursor:pointer" onclick="openEditModal('savings','${item.id}')" title="클릭하여 수정">
            <td>${item.desc}</td>
            <td class="amount" style="color:var(--savings);font-weight:700">${fmt(acc)} <span style="font-size:10px;color:var(--text-muted);font-weight:400">×${mo}</span></td>
            <td>${personBadge(item.person)}</td>
          </tr>`;
        } else {
          return `<tr style="cursor:pointer" onclick="openEditModal('asset','${item.id}')" title="클릭하여 수정">
            <td>${item.desc}</td>
            <td class="amount pos">${fmt(item.amount)}</td>
            <td>${personBadge(item.person)}</td>
          </tr>`;
        }
      }).join('')
    :'<tr><td colspan="3" class="empty">자산을 추가해보세요</td></tr>';

  // 총합 계산 (적금 누적 + 자산 금액)
  const totalAcc = allItems.reduce((s, item) => {
    if (item.type === 'auto-savings') return s + calcAcc({monthly: item.monthly, startMonth: item.startMonth});
    if (item.type === 'savings') return s + calcAcc({monthly: item.monthly, startMonth: item.startMonth});
    return s + (item.amount || 0);
  }, 0);
  const totalEl = document.getElementById('assets-total');
  if (totalEl) totalEl.textContent = fmt(totalAcc);
}

    if(idx>-1){ db.fixed[idx]={...db.fixed[idx],cat:g('f-cat'),person:g('f-person'),desc:g('f-desc'),amount:gi('f-amount')}; }
    await saveFix();
  } else if(modalType==='savings'){
    db.savings.push({id:uid(),name:g('f-name'),bank:g('f-bank'),monthly:gi('f-monthly'),target:gi('f-target'),startMonth:g('f-start'),maturity:g('f-maturity')});
    await saveSavings();
  } else if(modalType==='edit-savings'){
    const idx=db.savings.findIndex(s=>s.id===editId);
    if(idx>-1){ db.savings[idx]={...db.savings[idx],name:g('f-name'),bank:g('f-bank'),monthly:gi('f-monthly'),target:gi('f-target'),startMonth:g('f-start'),maturity:g('f-maturity')}; }
    await saveSavings();
  } else if(modalType==='edit-asset'){
    const idx=db.assets.findIndex(a=>a.id===editId);
    if(idx>-1){ db.assets[idx]={...db.assets[idx],cat:g('f-cat'),desc:g('f-desc'),person:g('f-person'),startMonth:g('f-start'),maturity:g('f-maturity'),amount:gi('f-amount')}; }
    await saveAssets();
  } else if(modalType==='asset'){
    db.assets.push({id:uid(),cat:g('f-cat'),desc:g('f-desc'),startMonth:g('f-start'),maturity:g('f-maturity'),amount:gi('f-amount'),person:g('f-person')||'wife'});
    await saveAssets();
  }
  closeModal(); render();
}

// 날짜 자동 포맷: 250210 → 25-02-10
function autoFormatDate(input) {
  input.addEventListener('input', function() {
    let v = this.value.replace(/[^0-9]/g,'');
    if(v.length >= 6) {
      v = v.slice(0,6);
      this.value = v.slice(0,2)+'-'+v.slice(2,4)+'-'+v.slice(4,6);
    }
  });
  input.addEventListener('blur', function() {
    let v = this.value.replace(/[^0-9]/g,'');
    if(v.length === 6) {
      this.value = v.slice(0,2)+'-'+v.slice(2,4)+'-'+v.slice(4,6);
    }
  });
}

function attachDateInputs() {
  ['f-start','f-maturity'].forEach(id => {
    const el = document.getElementById(id);
    if(el) autoFormatDate(el);
  });
}

// ── SMS 파싱 ──
let parsedSmsItems = [];

function openSmsModal() {
  document.getElementById('sms-input').value = '';
  document.getElementById('sms-preview').innerHTML = '';
  parsedSmsItems = [];
  document.getElementById('sms-modal-overlay').classList.add('open');
  setTimeout(() => {
    const ta = document.getElementById('sms-input');
    if (ta) ta.oninput = () => { parsedSmsItems = parseSms(ta.value); renderSmsPreview(); };
  }, 50);
}
function closeSmsModal() {
  document.getElementById('sms-modal-overlay').classList.remove('open');
}

function parseSms(text) {
  const results = [];
  const lines = text.split('\n').map(l=>l.trim()).filter(l=>l.length>0);

  // 결제수단 감지
  const payMap = {
    '신한':'신용카드','국민':'신용카드','하나':'신용카드','삼성':'신용카드',
    '현대':'신용카드','롯데':'신용카드','우리':'신용카드','bc':'신용카드','BC':'신용카드',
    '쿠팡':'쿠팡페이','네이버':'네이버페이','카카오':'신용카드','토스':'신용카드',
    '체크':'체크카드','지역':'지역페이','현금':'현금'
  };

  for (const line of lines) {
    // 금액 추출 (12,000원 or 12000원)
    const amountMatch = line.match(/([0-9,]+)원/);
    if (!amountMatch) continue;
    const amount = parseInt(amountMatch[1].replace(/,/g,''));
    if (!amount || amount <= 0) continue;

    // 날짜 추출
    let date = '';
    const today = new Date();
    const yy = String(today.getFullYear()).slice(2);
    const mm = String(today.getMonth()+1).padStart(2,'0');
    const dd = String(today.getDate()).padStart(2,'0');

    const datePatterns = [
      /(\d{2})\.(\d{2})\.(\d{2})/,   // 26.03.15
      /(\d{4})-(\d{2})-(\d{2})/,     // 2026-03-15
      /(\d{2})\/(\d{2})/,             // 03/15
      /(\d{2})-(\d{2})-(\d{2})/,     // 26-03-15
    ];
    for (const pat of datePatterns) {
      const m = line.match(pat);
      if (m) {
        if (pat.source.includes('4}')) date = `${String(m[1]).slice(2)}.${m[2]}.${m[3]}`;
        else if (m[3]) date = `${m[1]}.${m[2]}.${m[3]}`;
        else date = `${yy}.${m[1]}.${m[2]}`;
        break;
      }
    }
    if (!date) date = `${yy}.${mm}.${dd}`;

    // 결제수단 감지
    let payment = '신용카드';
    for (const [key, val] of Object.entries(payMap)) {
      if (line.includes(key)) { payment = val; break; }
    }

    // 내역 추출 — 금액/날짜/카드사명/불필요한 단어 제거
    let desc = line
      .replace(/\[.*?\]/g, '')
      .replace(/[0-9,]+원/g, '')
      .replace(/일시불|할부|승인|취소|Web발신|web발신|\(.*?\)/g, '')
      .replace(/\d{4}-\d{2}-\d{2}|\d{2}\.\d{2}\.\d{2}|\d{2}\/\d{2}/g, '')
      .replace(/신한카드|국민카드|하나카드|삼성카드|현대카드|롯데카드|우리카드|쿠팡페이|네이버페이|카카오페이|토스/g, '')
      .replace(/[^\w가-힣\s]/g, ' ')
      .trim()
      .replace(/\s+/g, ' ');

    if (!desc) desc = '내역없음';

    results.push({ id: uid(), date, cat: '식비', payment, person: 'wife', desc, amount });
  }
  return results;
}

function renderSmsPreview() {
  const el = document.getElementById('sms-preview');
  if (!parsedSmsItems.length) { el.innerHTML = ''; return; }
  el.innerHTML = `
    <div style="font-size:11px;font-weight:700;color:var(--text-muted);margin-bottom:6px">인식된 내역 ${parsedSmsItems.length}건 (클릭하여 수정)</div>
    ${parsedSmsItems.map((r,i)=>`
      <div style="display:flex;gap:6px;align-items:center;padding:6px 8px;background:var(--surface2);border-radius:8px;margin-bottom:4px;font-size:12px;flex-wrap:wrap">
        <span style="color:var(--text-muted);font-family:'DM Mono',monospace;white-space:nowrap">${r.date}</span>
        <select onchange="parsedSmsItems[${i}].cat=this.value" style="border:1px solid var(--border);border-radius:4px;font-size:11px;padding:2px 4px;font-family:'Noto Sans KR',sans-serif">
          ${CATS_VAR.map(c=>`<option${c===r.cat?' selected':''}>${c}</option>`).join('')}
        </select>
        <select onchange="parsedSmsItems[${i}].payment=this.value" style="border:1px solid var(--border);border-radius:4px;font-size:11px;padding:2px 4px;font-family:'Noto Sans KR',sans-serif">
          ${PAYMENTS.map(p=>`<option${p===r.payment?' selected':''}>${p}</option>`).join('')}
        </select>
        <input value="${r.desc}" onchange="parsedSmsItems[${i}].desc=this.value" style="flex:1;min-width:80px;border:1px solid var(--border);border-radius:4px;font-size:11px;padding:2px 6px;font-family:'Noto Sans KR',sans-serif">
        <span style="font-family:'DM Mono',monospace;font-weight:700;color:var(--red)">${fmt(r.amount)}</span>
        <button onclick="parsedSmsItems.splice(${i},1);renderSmsPreview()" style="background:none;border:none;color:var(--text-muted);cursor:pointer;font-size:13px">✕</button>
      </div>`).join('')}
  `;
}

async function saveSmsItems() {
  if (!parsedSmsItems.length) { closeSmsModal(); return; }
  db.variable.push(...parsedSmsItems);
  await saveVar();
  closeSmsModal();
  render();
}
